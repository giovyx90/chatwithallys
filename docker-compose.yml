services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
      ollama:
        condition: service_started
    ports:
      - "${BOT_API_BIND:-127.0.0.1}:${BOT_API_PORT:-8000}:8000"
    volumes:
      - podcast_data:/app/data/podcasts
    networks:
      - allys

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-allys}
      POSTGRES_USER: ${POSTGRES_USER:-allys}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allys

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - allys

  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - allys

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_KEEP_ALIVE: 30m
    networks:
      - allys

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
  podcast_data:

networks:
  allys:
    driver: bridge
